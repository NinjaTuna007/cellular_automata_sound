# ─────────────────────────────────────────────────────────────
# No side reflection — waves leak out left and right edges
# 400 m wide (200 m each side of centered source), 90 m deep
# ─────────────────────────────────────────────────────────────

grid:
  nx: 400
  ny: 90
  dx: 1.0
  dy: 1.0

time:
  dt: 0              # auto CFL-safe
  duration: 0.5

model:
  type: wave
  absorption: 0.05

source:
  ix: null          # center
  iy: null          # center
  amplitude: 1400.0
  frequency: 24000    # Hz — λ≈7.5m ≈ 7.5 cells/wavelength at dx=1

boundary:
  top:    -0.98
  bottom:  0.99
  left:    0.99      # fully open
  right:   0.99     # fully open

ssp:
  depths: [0, 15, 35, 60, 90]
  speeds: [1535, 1518, 1492, 1503, 1520]

backend: auto

output:
  frame_stride: 8
  gif_fps: 25
  tag: no_side_reflection
