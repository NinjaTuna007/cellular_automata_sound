# ─────────────────────────────────────────────────────────────
# No side reflection — waves leak out through the left and right edges
#
# Simulates an ocean cross-section 400 m wide (200 m on each side of a
# centered source) and 90 m deep.  The left and right boundaries are
# fully open (reflection = 0), so energy that reaches the sides just
# disappears — as if the ocean extends infinitely in both directions.
# Top and bottom still reflect (surface + seabed).
#
# dx/dy/dt are set to 0 → auto-resolved from the source frequency so
# there's never any aliasing, regardless of what frequency you pick.
# ─────────────────────────────────────────────────────────────

grid:
  width_m: 400       # 200 m on each side of the centered source
  height_m: 90       # depth of the ocean slice

time:
  dt: 0              # auto CFL-safe
  duration: 0.5      # half a second of propagation

model:
  type: wave
  absorption: 0.05

source:
  x: 200.0           # metres from left edge (centre of 400 m domain)
  y: 45.0            # metres from top (centre of 90 m depth)
  amplitude: 1400.0  # Pa
  frequency: 200     # Hz — change this and dx/dy auto-adjust

boundary:
  top:    -0.98      # surface: almost phase-inverting
  bottom:  0.99      # seabed: almost rigid
  left:    0.0       # fully open — waves pass through
  right:   0.0       # fully open — waves pass through

ssp:
  depths: [0, 15, 35, 60, 90]
  speeds: [1535, 1518, 1492, 1503, 1520]

backend: auto

output:
  frame_stride: 8
  gif_fps: 25
  tag: no_side_reflection
