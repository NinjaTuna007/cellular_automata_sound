# ─────────────────────────────────────────────────────────────
# 24 kHz source in a small fully-reflecting tank
#
# This config simulates a high-frequency sonar pulse inside a rigid
# 3 m × 1.5 m laboratory tank.  All four walls reflect, so you get
# beautiful standing-wave interference patterns as the wavefronts
# bounce around.
#
# At 24 kHz in water, the wavelength is about 6 cm.  The engine
# auto-resolves dx ≈ 6 mm (10 cells per wavelength) and dt ≈ 1.3 μs,
# giving a grid of ~480 × 240 cells.  That's about 116 k cells —
# the GPU chews through this easily.
#
# WARNING: don't set width_m to hundreds of metres at 24 kHz unless
# you have a seriously beefy GPU.  A 400 m ocean at 24 kHz would
# need ~930 million cells.
# ─────────────────────────────────────────────────────────────

grid:
  width_m: 8.0       # 3 metre wide tank
  height_m: 4.0      # 1.5 metre deep tank
  cells_per_wavelength: 10  # 6 is enough for GUI exploration; 10 for accuracy
  # stencil_order: 4   # uncomment for 4th-order stencil (needs only ~5 cpw)
  # dx: 1
  # dy: 0.5
time:
  dt: 0              # auto CFL-safe (≈1.3 μs)
  duration: 1.0     # 20 ms — sound crosses the 3 m tank ~10 times

model:
  type: wave
  absorption: 0.02   # low absorption — let it ring

source:
  ix: null           # center
  iy: null           # center
  amplitude: 1400.0  # Pa
  frequency: 24000   # 24 kHz — dx/dy auto-resolve to ≈6 mm cells

boundary:
  top:    -0.98      # surface (phase-inverting)
  bottom:  0.99      # hard bottom
  left:    0.99      # rigid side wall
  right:   0.99      # rigid side wall

ssp:
  depths: [0, 0.75, 1.5]
  speeds: [1500, 1495, 1500]       # nearly uniform — small tank

backend: auto

output:
  frame_stride: 500    # 756k steps / 500 = ~1500 frames, keeps replay manageable
  gif_fps: 30
  tag: 24khz_all_reflect
