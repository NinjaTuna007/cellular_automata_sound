# ─────────────────────────────────────────────────────────────
# No side reflection — waves leak out left and right edges
# 400 m wide (200 m each side of centered source), 90 m deep
# 1 second duration at dt = 0.0005 s
# ─────────────────────────────────────────────────────────────

grid:
  nx: 200
  ny: 45
  dx: 2.0
  dy: 2.0

time:
  dt: 0.0005
  duration: 1.0

model:
  type: wave
  absorption: 0.05

source:
  ix: null          # center
  iy: null          # center
  amplitude: 1400.0
  frequency: 24000

boundary:
  top:    -0.98
  bottom:  0.99
  left:    0.0      # fully open
  right:   0.0      # fully open

ssp:
  depths: [0, 15, 35, 60, 90]
  speeds: [1535, 1518, 1492, 1503, 1520]

backend: auto

output:
  frame_stride: 8
  gif_fps: 25
  tag: no_side_reflection
